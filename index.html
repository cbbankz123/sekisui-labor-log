<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Labor Log - Sekisui Pasadena</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

*{box-sizing:border-box}
body{font-family:sans-serif;background:#0a1929;color:#d9e2ec;padding:1rem;min-height:100vh}
h2{font-size:1.5rem;font-weight:800;letter-spacing:.05em;margin-bottom:1rem;font-family:sans-serif}
.field{background:#102a43;border:1px solid #334e68;color:#d9e2ec;border-radius:4px;padding:.5rem .75rem;width:100%;font-size:.95rem;margin-bottom:.25rem}
.field:focus{outline:none;border-color:#fbbf24;box-shadow:0 0 0 2px rgba(251,191,36,.2)}
.field::placeholder{color:#486581}
label{display:block;font-size:.78rem;font-weight:700;color:#829ab1;margin-bottom:.25rem;margin-top:.75rem;text-transform:uppercase;letter-spacing:.06em}
.btn{background:#fbbf24;color:#0a1929;font-weight:700;font-size:1rem;padding:.6rem 1.5rem;border-radius:4px;border:none;cursor:pointer;margin-top:.75rem}
.btn:disabled{background:#486581;color:#627d98;cursor:not-allowed}
.btn-out{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b;border-radius:4px;padding:.35rem .85rem;cursor:pointer;font-weight:700;font-size:.85rem}
.tab-btn{display:inline-block;padding:.5rem 1rem;background:#243b53;cursor:pointer;border-radius:4px;margin-right:.35rem;font-weight:700;font-size:.9rem;border:none;color:#829ab1;letter-spacing:.04em;text-transform:uppercase}
.tab-btn.active{background:#fbbf24;color:#0a1929}
.panel{display:none;padding:1rem 0}
.panel.show{display:block}
.wcard{background:#0d2236;border:1px solid #334e68;border-radius:6px;padding:.75rem 1rem;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.5rem;border-bottom:1px solid #334e68;color:#627d98;font-size:.75rem;text-transform:uppercase}
td{padding:.5rem;border-bottom:1px solid #1a3550;color:#bcccdc}
.hrs{color:#fbbf24;font-weight:700}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:#102a43;border:1px solid #334e68;border-radius:8px;padding:1.5rem;width:100%;max-width:380px}
.modal-title{font-size:1.2rem;font-weight:700;margin-bottom:.35rem}
.modal-sub{color:#829ab1;font-size:.85rem;margin-bottom:1rem}

</style>
</head>
<body>

<div id="coModal" class="modal">
  <div class="modal-box">
    <div class="modal-title" id="coModalTitle">Clock Out</div>
    <div class="modal-sub" id="coModalSub"></div>
    <label>Time Out</label>
    <input type="time" id="coModalTime" class="field"/>
    <div id="coModalHrs" style="margin:.75rem 0;color:#fbbf24;font-size:1.1rem;font-weight:700"></div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem">
      <button class="btn" style="background:#334e68;color:#d9e2ec;margin-top:0" onclick="closeModal()">Cancel</button>
      <button class="btn" style="background:#7f1d1d;color:#fca5a5;margin-top:0" onclick="confirmClockOut()">Confirm Clock Out</button>
    </div>
  </div>
</div>

<div id="editModal" class="modal">
  <div class="modal-box">
    <div class="modal-title">Edit Entry</div>
    <div class="modal-sub" id="editSub"></div>
    <label>Time In</label><input type="time" id="editIn" class="field" oninput="updateEditPrev()"/>
    <label>Time Out</label><input type="time" id="editOut" class="field" oninput="updateEditPrev()"/>
    <div id="editHrs" style="margin:.75rem 0;color:#fbbf24;font-size:1.1rem;font-weight:700"></div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem">
      <button class="btn" style="background:#334e68;color:#d9e2ec;margin-top:0" onclick="closeEdit()">Cancel</button>
      <button class="btn" style="margin-top:0" onclick="confirmEdit()">Save</button>
    </div>
  </div>
</div>

<h2>LABOR LOG - SEKISUI PASADENA</h2>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
  <div id="dateLine" style="color:#829ab1;font-size:.85rem"></div>
  <div id="activeBadge" style="background:#14532d;color:#4ade80;padding:.2rem .75rem;border-radius:99px;font-size:.8rem;font-weight:700">0 active</div>
</div>

<div style="margin-bottom:1rem;border-bottom:2px solid #334e68;padding-bottom:.5rem;display:flex;flex-wrap:wrap;gap:.35rem">
  <button class="tab-btn active" onclick="showTab('clockin')">Clock In</button>
  <button class="tab-btn" onclick="showTab('active')">Active <span id="activeCt">0</span></button>
  <button class="tab-btn" onclick="showTab('logs')">Daily Log</button>
  <button class="tab-btn" onclick="showTab('summary')">Summary</button>
</div>

<div id="panel-clockin" class="panel show">
  <label>Employee Name</label>
  <div style="position:relative">
    <input type="text" id="empName" class="field" placeholder="Start typing..." autocomplete="off"
      oninput="acFilter('empName','acEmp',empNames,'selectEmp')"
      onkeydown="acKey(event,'acEmp',empNames,'selectEmp')"
      onblur="setTimeout(function(){closeAC('acEmp')},150)"/>
    <ul id="acEmp" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:#102a43;border:1px solid #334e68;border-top:none;border-radius:0 0 4px 4px;max-height:180px;overflow-y:auto;margin:0;padding:0;list-style:none"></ul>
  </div>
  <label>Job Number</label>
  <div style="position:relative">
    <input type="text" id="jobNum" class="field" placeholder="Start typing..." autocomplete="off"
      oninput="acFilter('jobNum','acJob',jobNumbers,'selectJob')"
      onkeydown="acKey(event,'acJob',jobNumbers,'selectJob')"
      onblur="setTimeout(function(){closeAC('acJob')},150)"/>
    <ul id="acJob" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:#102a43;border:1px solid #334e68;border-top:none;border-radius:0 0 4px 4px;max-height:180px;overflow-y:auto;margin:0;padding:0;list-style:none"></ul>
  </div>
  <label>Work Date</label>
  <input type="date" id="workDate" class="field"/>
  <label>Time In (leave blank for right now)</label>
  <input type="time" id="timeIn" class="field"/>
  <div id="alreadyWarn" style="display:none;margin-top:.75rem;padding:.75rem;background:#422006;border:1px solid #d97706;border-radius:4px;color:#fcd34d;font-size:.85rem"></div>
  <button class="btn" onclick="clockIn()" id="clockInBtn">Clock In</button>
  <div style="margin-top:1.5rem">
    <label>Today Completed</label>
    <div id="todayList"></div>
  </div>
</div>

<div id="panel-active" class="panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
    <span style="font-size:1rem;font-weight:700;color:#d9e2ec">Currently On Site</span>
    <button class="btn" style="padding:.35rem .75rem;font-size:.8rem;margin-top:0" onclick="loadAll()">Refresh</button>
  </div>
  <div id="activeList"></div>
  <button id="clockAllBtn" class="btn" style="display:none;background:#7f1d1d;color:#fca5a5;width:100%;margin-top:1rem" onclick="clockOutAll()">Clock Out Everyone</button>
</div>

<div id="panel-logs" class="panel">
  <div style="display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap">
    <input type="text" id="srch" class="field" placeholder="Search..." oninput="renderLogs()" style="flex:1;min-width:150px;margin-bottom:0"/>
    <input type="date" id="srchDate" class="field" oninput="renderLogs()" style="width:auto;margin-bottom:0"/>
    <button class="btn" style="padding:.4rem .75rem;font-size:.85rem;margin-top:0" onclick="document.getElementById('srch').value='';document.getElementById('srchDate').value='';renderLogs()">Clear</button>
  </div>
  <div style="overflow-x:auto">
    <table><thead><tr><th>Date</th><th>Employee</th><th>Job</th><th>In</th><th>Out</th><th>Hrs</th><th></th><th></th></tr></thead>
    <tbody id="logsTbody"></tbody></table>
  </div>
  <div id="logsMeta" style="color:#486581;font-size:.8rem;margin-top:.5rem"></div>
</div>

<div id="panel-summary" class="panel">
  <div style="display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap;align-items:flex-end">
    <div><label>Month</label><input type="month" id="sumMonth" class="field" style="width:auto;margin-bottom:0" onchange="renderSummary()"/></div>
    <div><label>Job Filter</label><input type="text" id="sumJob" class="field" placeholder="All jobs" oninput="renderSummary()" style="width:160px;margin-bottom:0"/></div>
  </div>
  <div id="sumContainer"></div>
  <label style="margin-top:1.5rem">Employee Totals</label>
  <div id="empTotals"></div>
</div>

<script>
var SURL='https://vrdoinopqemwelvaxvsx.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyZG9pbm9wcWVtd2VsdmF4dnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwODgxOTksImV4cCI6MjA5MzY2NDE5OX0.kIjcOCO0bUHHaDTXgetbH8pnKwNA0rmy0YOc4jWKD2E';
var TBL='labor_logs';
var db=supabase.createClient(SURL,SKEY);
var allLogs=[],empNames=[],jobNumbers=[],pendingId=null,pendingDate=null,acIdx={};

function pad(n){return String(n).padStart(2,'0');}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function nowHHMM(){var d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}
function hhmmOf(ts){if(!ts)return '';var t=ts.indexOf('T')>=0?ts.split('T')[1]:ts.split(' ')[1];return t?t.substring(0,5):'';}
function mins(s){var p=s.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function calcHrs(a,b){var d=mins(b)-mins(a);if(d<0)d+=1440;return Math.round(d*100/60)/100;}
function makeTS(dt,hm){return dt+' '+hm+':00';}
function fmtT(ts){if(!ts)return '--';var t=hhmmOf(ts);if(!t)return '--';var h=parseInt(t.split(':')[0]),m=t.split(':')[1],ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ap;}
function elapsed(ts){if(!ts)return '';var t=hhmmOf(ts);if(!t)return '';var d=mins(nowHHMM())-mins(t);if(d<0)d+=1440;return d<60?d+'m on site':(Math.floor(d/60)+'h '+(d%60)+'m on site');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return esc(s).replace(/'/g,'&#39;');}

function showTab(n){
  ['clockin','active','logs','summary'].forEach(function(t){
    document.getElementById('panel-'+t).classList.toggle('show',t===n);
  });
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active',['clockin','active','logs','summary'][i]===n);
  });
}

function closeModal(){document.getElementById('coModal').style.display='none';}
function closeEdit(){document.getElementById('editModal').style.display='none';}

function acFilter(iid,lid,src,fn){
  var v=document.getElementById(iid).value.toLowerCase().trim();
  acIdx[lid]=-1;
  if(iid==='empName') checkOpen();
  if(!v){closeAC(lid);return;}
  var m=src.filter(function(x){return x.toLowerCase().indexOf(v)>=0;});
  if(!m.length){closeAC(lid);return;}
  var ul=document.getElementById(lid);
  ul.innerHTML=m.map(function(x,i){return '<li style="padding:.45rem .75rem;cursor:pointer;color:#d9e2ec" onmousedown="'+fn+'(\''+ea(x)+'\')" onmouseover="this.style.background=\'#1a3a55\'" onmouseout="this.style.background=\'\'">'+esc(x)+'</li>';}).join('');
  ul.style.display='block';
}
function acKey(e,lid,src,fn){
  var ul=document.getElementById(lid);var items=ul.querySelectorAll('li');
  if(!items.length)return;
  var i=acIdx[lid]||-1;
  if(e.key==='ArrowDown'){i=Math.min(i+1,items.length-1);acIdx[lid]=i;items.forEach(function(x,j){x.style.background=j===i?'#1a3a55':'';});e.preventDefault();}
  else if(e.key==='ArrowUp'){i=Math.max(i-1,0);acIdx[lid]=i;items.forEach(function(x,j){x.style.background=j===i?'#1a3a55':'';});e.preventDefault();}
  else if(e.key==='Enter'&&i>=0){window[fn](items[i].textContent);e.preventDefault();}
  else if(e.key==='Escape'){closeAC(lid);}
}
function closeAC(lid){document.getElementById(lid).style.display='none';}
function selectEmp(n){document.getElementById('empName').value=n;closeAC('acEmp');checkOpen();}
function selectJob(n){document.getElementById('jobNum').value=n;closeAC('acJob');}

function checkOpen(){
  var name=document.getElementById('empName').value.trim().toLowerCase();
  var w=document.getElementById('alreadyWarn');
  if(!name){w.style.display='none';return;}
  var o=allLogs.find(function(r){return r.employee_name.toLowerCase()===name&&!r.time_out;});
  if(o){w.style.display='block';w.textContent=o.employee_name+' is clocked in on '+o.job_number+'. Submitting will clock them out first.';}
  else{w.style.display='none';}
}

async function loadAll(){
  var res=await db.from(TBL).select('*').order('work_date',{ascending:false}).order('time_in',{ascending:false});
  if(res.error){console.error(res.error);return;}
  allLogs=res.data||[];
  empNames=[...new Set(allLogs.map(function(r){return r.employee_name;}))].sort();
  jobNumbers=[...new Set(allLogs.map(function(r){return r.job_number;}))].sort();
  var n=allLogs.filter(function(r){return !r.time_out;}).length;
  document.getElementById('activeBadge').textContent=n+' active';
  document.getElementById('activeCt').textContent=n;
  renderActive();renderToday();renderLogs();renderSummary();
}

async function clockIn(){
  var emp=document.getElementById('empName').value.trim();
  var job=document.getElementById('jobNum').value.trim();
  var dt=document.getElementById('workDate').value;
  var tin=document.getElementById('timeIn').value||nowHHMM();
  if(!emp||!job||!dt){alert('Fill in name, job and date');return;}
  document.getElementById('clockInBtn').disabled=true;
  var or2=await db.from(TBL).select('*').ilike('employee_name',emp).is('time_out',null);
  if(or2.data&&or2.data.length){for(var i=0;i<or2.data.length;i++) await doOut(or2.data[i],tin);}
  var res=await db.from(TBL).insert([{employee_name:emp,job_number:job,work_date:dt,time_in:makeTS(dt,tin),time_out:null,total_hours:null}]);
  document.getElementById('clockInBtn').disabled=false;
  if(res.error){alert('Save failed: '+res.error.message);return;}
  document.getElementById('timeIn').value='';
  document.getElementById('alreadyWarn').style.display='none';
  await loadAll();
}

var pendingRec=null;
function clockOut(id, rec){
  if(!rec) rec=allLogs.find(function(r){return r.id===id;});
  if(!rec){alert('Record not found');return;}
  pendingRec=rec;
  pendingId=rec.id;
  document.getElementById('coModalTitle').textContent='Clock Out: '+rec.employee_name;
  document.getElementById('coModalSub').textContent=rec.job_number+' - in at '+fmtT(rec.time_in);
  document.getElementById('coModalTime').value=nowHHMM();
  updateCoHrs();
  document.getElementById('coModalTime').oninput=updateCoHrs;
  document.getElementById('coModal').style.display='flex';
}
function updateCoHrs(){
  var tv=document.getElementById('coModalTime').value;
  var el=document.getElementById('coModalHrs');
  if(!pendingRec||!tv){el.textContent='';return;}
  var ih=hhmmOf(pendingRec.time_in);
  el.textContent=ih?calcHrs(ih,tv).toFixed(2)+' hrs':'';
}
async function confirmClockOut(){
  var tv=document.getElementById('coModalTime').value;
  if(!pendingRec||!tv)return;
  closeModal();
  await doOut(pendingRec,tv);
  await loadAll();
}
async function doOut(rec,outHM){
  var ih=hhmmOf(rec.time_in);
  var hrs=ih?calcHrs(ih,outHM):0;
  var res=await db.from(TBL).update({time_out:makeTS(rec.work_date,outHM),total_hours:hrs}).eq('id',rec.id);
  if(res.error){console.error('doOut error:',res.error);}
}
async function clockOutAll(){
  var open=allLogs.filter(function(r){return !r.time_out;});
  if(!open.length)return;
  if(!confirm('Clock out all '+open.length+' workers?'))return;
  var now=nowHHMM();
  for(var i=0;i<open.length;i++) await doOut(open[i],now);
  await loadAll();
}

function editEntry(id,rec){
  if(!rec) rec=allLogs.find(function(r){return r.id===id;});
  if(!rec)return;
  pendingId=rec.id;pendingDate=rec.work_date;
  document.getElementById('editSub').textContent=rec.employee_name+' - '+rec.job_number+' ('+rec.work_date+')';
  document.getElementById('editIn').value=hhmmOf(rec.time_in);
  document.getElementById('editOut').value=rec.time_out?hhmmOf(rec.time_out):'';
  updateEditPrev();
  document.getElementById('editModal').style.display='flex';
}
function updateEditPrev(){
  var a=document.getElementById('editIn').value,b=document.getElementById('editOut').value;
  document.getElementById('editHrs').textContent=(a&&b)?calcHrs(a,b).toFixed(2)+' hrs':'';
}
async function confirmEdit(){
  var a=document.getElementById('editIn').value,b=document.getElementById('editOut').value;
  if(!pendingId||!a||!b)return;
  closeEdit();
  var res=await db.from(TBL).update({time_in:makeTS(pendingDate,a),time_out:makeTS(pendingDate,b),total_hours:calcHrs(a,b)}).eq('id',pendingId);
  if(res.error){alert('Save failed: '+res.error.message);}
  else{await loadAll();}
}
async function deleteLog(id){
  if(!confirm('Delete this entry?'))return;
  var res=await db.from(TBL).delete().eq('id',id);
  if(res.error){alert('Delete failed: '+res.error.message);}
  await loadAll();
}

var openWorkers=[];
function renderActive(){
  openWorkers=allLogs.filter(function(r){return !r.time_out;});
  var el=document.getElementById('activeList');
  document.getElementById('clockAllBtn').style.display=openWorkers.length?'block':'none';
  el.innerHTML='';
  if(!openWorkers.length){el.innerHTML='<div style="color:#486581;padding:2rem;text-align:center">No one clocked in</div>';return;}
  openWorkers.forEach(function(r){
    var div=document.createElement('div');
    div.className='wcard';
    div.innerHTML='<div>'+
      '<div style="font-weight:700;font-size:1rem">'+esc(r.employee_name)+'</div>'+
      '<div style="color:#fbbf24;font-size:.85rem">'+esc(r.job_number)+'</div>'+
      '<div style="color:#486581;font-size:.8rem">In at '+fmtT(r.time_in)+' - '+elapsed(r.time_in)+'</div>'+
      '</div>';
    var btn=document.createElement('button');
    btn.className='btn-out';
    btn.textContent='Clock Out';
    btn.addEventListener('click',(function(rec){
      return function(){ clockOut(null,rec); };
    })(r));
    div.appendChild(btn);
    el.appendChild(div);
  });
}

function renderToday(){
  var today=todayStr();
  var rows=allLogs.filter(function(r){return r.work_date===today&&r.time_out;});
  var el=document.getElementById('todayList');
  el.innerHTML='';
  if(!rows.length){el.innerHTML='<div style="color:#486581;font-size:.85rem">None yet today</div>';return;}
  var tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th>Name</th><th>Job</th><th>In</th><th>Out</th><th>Hrs</th><th></th></tr></thead>';
  var tbody=document.createElement('tbody');
  rows.forEach(function(r){
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+esc(r.employee_name)+'</td><td style="color:#fbbf24">'+esc(r.job_number)+'</td><td>'+fmtT(r.time_in)+'</td><td>'+fmtT(r.time_out)+'</td><td class="hrs">'+(+r.total_hours||0).toFixed(2)+'</td><td></td>';
    var editBtn=document.createElement('button');
    editBtn.style.cssText='background:transparent;border:none;color:#fbbf24;cursor:pointer;font-size:.8rem';
    editBtn.textContent='Edit';
    editBtn.addEventListener('click',(function(rec){return function(){editEntry(null,rec);};})(r));
    tr.cells[5].appendChild(editBtn);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  el.appendChild(tbl);
}

function renderLogs(){
  var s=document.getElementById('srch').value.toLowerCase();
  var df=document.getElementById('srchDate').value;
  var rows=allLogs;
  if(s)rows=rows.filter(function(r){return r.employee_name.toLowerCase().indexOf(s)>=0||r.job_number.toLowerCase().indexOf(s)>=0;});
  if(df)rows=rows.filter(function(r){return r.work_date===df;});
  var tb=document.getElementById('logsTbody');
  tb.innerHTML='';
  if(!rows.length){
    var tr=document.createElement('tr');
    tr.innerHTML='<td colspan="8" style="text-align:center;color:#486581;padding:2rem">No records</td>';
    tb.appendChild(tr);
    document.getElementById('logsMeta').textContent='';
    return;
  }
  var tot=rows.filter(function(r){return r.time_out;}).reduce(function(s,r){return s+(+r.total_hours||0);},0);
  rows.forEach(function(r){
    var op=!r.time_out;
    var tr=document.createElement('tr');
    if(op) tr.style.background='rgba(74,222,128,.04)';
    tr.innerHTML=
      '<td>'+r.work_date+'</td>'+
      '<td>'+esc(r.employee_name)+'</td>'+
      '<td style="color:#fbbf24">'+esc(r.job_number)+'</td>'+
      '<td>'+fmtT(r.time_in)+'</td>'+
      '<td>'+(op?'<span style="background:#14532d;color:#4ade80;padding:.1rem .4rem;border-radius:99px;font-size:.75rem">Active</span>':fmtT(r.time_out))+'</td>'+
      '<td class="hrs">'+(op?'--':(+(r.total_hours||0)).toFixed(2))+'</td>'+
      '<td></td><td></td>';
    var actionCell=tr.cells[6];
    var delCell=tr.cells[7];
    if(op){
      var outBtn=document.createElement('button');
      outBtn.className='btn-out';
      outBtn.style.cssText='padding:.2rem .5rem;font-size:.75rem';
      outBtn.textContent='Out';
      outBtn.addEventListener('click',(function(rec){return function(){clockOut(null,rec);};})(r));
      actionCell.appendChild(outBtn);
    } else {
      var editBtn=document.createElement('button');
      editBtn.style.cssText='background:transparent;border:none;color:#fbbf24;cursor:pointer;font-size:.8rem';
      editBtn.textContent='Edit';
      editBtn.addEventListener('click',(function(rec){return function(){editEntry(null,rec);};})(r));
      actionCell.appendChild(editBtn);
    }
    var delBtn=document.createElement('button');
    delBtn.style.cssText='background:transparent;border:none;color:#486581;cursor:pointer;font-size:.8rem';
    delBtn.textContent='Del';
    delBtn.addEventListener('click',(function(rec){return function(){deleteLog(rec.id);};})(r));
    delCell.appendChild(delBtn);
    tb.appendChild(tr);
  });
  document.getElementById('logsMeta').textContent=rows.length+' records - Completed: '+tot.toFixed(2)+' hrs';
}

function renderSummary(){
  var mv=document.getElementById('sumMonth').value;
  var jf=document.getElementById('sumJob').value.trim().toLowerCase();
  if(!mv)return;
  var yr=parseInt(mv.split('-')[0]),mo=parseInt(mv.split('-')[1]);
  var rows=allLogs.filter(function(r){
    if(!r.time_out)return false;
    var d=new Date(r.work_date+'T12:00:00');
    return d.getFullYear()===yr&&d.getMonth()+1===mo;
  });
  if(jf)rows=rows.filter(function(r){return r.job_number.toLowerCase().indexOf(jf)>=0;});
  var wk=function(ds){var d=parseInt(ds.split('-')[2]);if(d<=7)return 0;if(d<=14)return 1;if(d<=21)return 2;return 3;};
  var jobs={};
  rows.forEach(function(r){if(!jobs[r.job_number])jobs[r.job_number]=[0,0,0,0];jobs[r.job_number][wk(r.work_date)]+=+r.total_hours||0;});
  var el=document.getElementById('sumContainer');
  if(!Object.keys(jobs).length){el.innerHTML='<div style="color:#486581;padding:1rem;text-align:center">No completed data</div>';renderEmpTot([]);return;}
  var wl=['Wk1 (1-7)','Wk2 (8-14)','Wk3 (15-21)','Wk4+ (22+)'];
  var gw=[0,0,0,0];
  var h='<div style="overflow-x:auto"><table><thead><tr><th>Job</th>'+wl.map(function(w){return '<th>'+w+'</th>';}).join('')+'<th>Total</th></tr></thead><tbody>';
  Object.entries(jobs).sort().forEach(function(e){
    var j=e[0],w=e[1],t=w.reduce(function(a,b){return a+b;},0);
    w.forEach(function(v,i){gw[i]+=v;});
    h+='<tr><td style="color:#fbbf24;font-weight:700">'+esc(j)+'</td>'+w.map(function(v){return '<td class="'+(v>0?'hrs':'')+'">'+( v>0?v.toFixed(2):'--')+'</td>';}).join('')+'<td class="hrs">'+t.toFixed(2)+'</td></tr>';
  });
  var gt=gw.reduce(function(a,b){return a+b;},0);
  h+='<tr style="border-top:2px solid #334e68"><td style="font-weight:700">TOTAL</td>'+gw.map(function(v){return '<td class="hrs">'+(v>0?v.toFixed(2):'--')+'</td>';}).join('')+'<td class="hrs" style="color:#f59e0b">'+gt.toFixed(2)+'</td></tr>';
  h+='</tbody></table></div>';
  el.innerHTML=h;
  renderEmpTot(rows);
}

function renderEmpTot(rows){
  var em={};
  rows.forEach(function(r){if(!em[r.employee_name])em[r.employee_name]=0;em[r.employee_name]+=+r.total_hours||0;});
  var el=document.getElementById('empTotals');
  if(!Object.keys(em).length){el.innerHTML='<div style="color:#486581;font-size:.85rem">No data</div>';return;}
  el.innerHTML='<table><thead><tr><th>Employee</th><th>Hours</th></tr></thead><tbody>'+
    Object.entries(em).sort(function(a,b){return b[1]-a[1];}).map(function(e){return '<tr><td>'+esc(e[0])+'</td><td class="hrs">'+e[1].toFixed(2)+'</td></tr>';}).join('')+'</tbody></table>';
}

document.getElementById('dateLine').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('workDate').value=todayStr();
document.getElementById('sumMonth').value=todayStr().slice(0,7);
loadAll();
</script>
